services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./data:/data
    restart: 'unless-stopped'
    env_file:
      - .env
    networks:
      - caddy_vaultwarden

networks:
  caddy_vaultwarden:
    name: caddy_vaultwarden
    external: true
