services:
  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:latest
    container_name: audiobookshelf
    restart: always
    volumes:
      - ./audiobooks:/audiobooks
      - ./books:/books
      - ./podcasts:/podcasts
      - ./config:/config
      - ./metadata:/metadata
    environment:
      - TZ=Europe/Rome
    networks:
      - caddy_audiobookshelf

networks:
  caddy_audiobookshelf:
    name: caddy_audiobookshelf
    external: true
