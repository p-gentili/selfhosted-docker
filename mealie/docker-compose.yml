services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:latest
    container_name: mealie
    restart: always
    deploy:
      resources:
        limits:
          memory: 1000M
    volumes:
      - ./data:/app/data/
    env_file:
      - .env
    networks:
      - caddy_mealie

networks:
  caddy_mealie:
    name: caddy_mealie
    external: true
