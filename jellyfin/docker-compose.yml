services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    volumes:
      - ./config:/config
      - ./cache:/cache
      - /media/external/media:/media
    restart: 'unless-stopped'
    networks:
      - caddy_jellyfin
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card1:/dev/dri/card0
    group_add:
      - "109"

networks:
  caddy_jellyfin:
    name: caddy_jellyfin
    external: true
