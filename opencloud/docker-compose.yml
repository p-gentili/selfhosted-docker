services:
  opencloud:
    image: opencloudeu/opencloud:latest
    container_name: opencloud
    restart: unless-stopped
    entrypoint: /bin/sh
    command: ["-c", "opencloud init || true; opencloud server"]
    environment:
      OC_URL: ${OPENCLOUD_FQDN}
      OC_LOG_LEVEL: info
      OC_LOG_COLOR: "false"
      OC_LOG_PRETTY: "false"
      OC_INSECURE: "false"
      PROXY_TLS: "false"
      PROXY_HTTP_ADDR: 0.0.0.0:9200
      PROXY_CSP_CONFIG_FILE_LOCATION: /etc/opencloud/csp.yaml

      # Initial admin (used only if no admin exists yet)
      IDM_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
      IDM_CREATE_DEMO_USERS: "false"

      # External OIDC via Authentik (Public client + PKCE — no secret needed)
      OC_OIDC_ISSUER: ${OIDC_ISSUER_URL}
      WEB_OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      WEB_OIDC_METADATA_URL: ${OIDC_WEB_METADATA_URL}
      PROXY_AUTOPROVISION_ACCOUNTS: "true"
      PROXY_OIDC_REWRITE_WELLKNOWN: "true"
      PROXY_USER_OIDC_CLAIM: preferred_username
      PROXY_USER_CS3_CLAIM: username
      # Validate tokens by calling Authentik's userinfo endpoint instead of
      # locally verifying the JWT signature. Required because OC_OIDC_ISSUER
      # points at the Authentik root (so `iss` is shared across the web and
      # iOS providers configured with "Same as global issuer" mode), and
      # Authentik does not serve /.well-known/openid-configuration at the
      # root — so OCIS can't auto-discover the JWKS URL. The userinfo path
      # works regardless of discovery and is the documented OCIS workaround
      # for the multi-provider Authentik setup (opencloud-eu#835).
      PROXY_OIDC_ACCESS_TOKEN_VERIFY_METHOD: none

      # Run the WOPI bridge as a sub-process so it shares 127.0.0.1 with the
      # gateway/storage services. The alternative (separate container) requires
      # exposing every internal gRPC port on 0.0.0.0 + routable registry
      # addresses; not worth it for a single-host deployment.
      OC_ADD_RUN_SERVICES: collaboration
      COLLABORATION_HTTP_ADDR: 0.0.0.0:9300
      COLLABORATION_APP_NAME: Collabora
      COLLABORATION_APP_PRODUCT: Collabora
      # Reach Collabora directly over the docker network, not through Caddy.
      COLLABORATION_APP_ADDR: https://opencloud-collabora:9980
      COLLABORATION_APP_ICON: ${COLLABORA_FQDN}/favicon.ico
      COLLABORATION_APP_INSECURE: "true"
      COLLABORATION_WOPI_SRC: ${COLLABORATION_FQDN}
      COLLABORATION_CS3API_DATAGATEWAY_INSECURE: "true"
    volumes:
      - ./config:/etc/opencloud
      - ./data:/var/lib/opencloud
    networks:
      - frontend
      - backend

  opencloud-collabora:
    image: collabora/code:latest
    container_name: opencloud-collabora
    restart: unless-stopped
    environment:
      # WOPI host allowlist — must match the collaboration server's public
      # origin (where browsers send WOPISrc from), not OpenCloud's.
      aliasgroup1: ${COLLABORATION_FQDN}:443
      username: admin
      password: ${COLLABORA_PASSWORD}
      dictionaries: en it
      # server_name pins the URLs Collabora advertises in /hosting/discovery.
      # Without it, the URLs are derived from the Host header, which would be
      # the internal hostname when collaboration fetches discovery directly.
      extra_params: --o:ssl.enable=true --o:ssl.termination=false --o:server_name=${COLLABORA_HOST} --o:net.frame_ancestors=${OPENCLOUD_HOST}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      # WOPI proof-signing keys (generated by init.sh). Without these Collabora
      # logs "No proof-key will be present in discovery" and OpenCloud rejects
      # every WOPI request.
      - ./collabora/proof_key:/etc/coolwsd/proof_key:ro
      - ./collabora/proof_key.pub:/etc/coolwsd/proof_key.pub:ro
    cap_add:
      - MKNOD
    tty: true
    networks:
      - frontend
      - backend

networks:
  frontend:
    name: frontend
    external: true
  backend:
