services:
  syncthing:
    image: syncthing/syncthing:latest
    container_name: syncthing
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ./data:/var/syncthing
    restart: unless-stopped
    networks:
      - caddy_syncthing

networks:
  caddy_syncthing:
    name: caddy_syncthing
    external: true
